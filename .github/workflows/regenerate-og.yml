name: Regenerate OG image

on:
  schedule:
    # The 2nd gives prior month's data time to firm up.
    - cron: '0 6 2 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      # DejaVu Sans is what generate-og.js targets; base runner doesn't guarantee it.
      - run: sudo apt-get install -y fonts-dejavu-core

      - run: npm ci

      - run: npm run og

      - name: Commit if changed
        run: |
          if git diff --quiet docs/og.png; then
            echo "No changes to docs/og.png, skipping commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/og.png
          git commit -m "chore: regenerate OG image"
          git push
